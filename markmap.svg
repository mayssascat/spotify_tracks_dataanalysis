 class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="770" height="40"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">1. 
<p data-lines="7,8"><strong>Most music is unpopular.</strong> Average popularity: 33/100. The distribution is heavily skewed toward low scores.</p></div></div></foreignObject></g><g data-depth="3" data-path="1.3.5" class="markmap-node" transform="translate(659, -98.65625)"><line stroke="#9467bd" stroke-width="1.375" x1="-1" x2="987" y1="40.6875" y2="40.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="969" height="40"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">2. 
<p data-lines="9,10"><strong>Explicit songs score higher</strong> (36.5 vs 32.9), but this is due to genre clustering (hip-hop, comedy, metal) rather than explicit content itself.</p></div></div></foreignObject></g><g data-depth="3" data-path="1.3.6" class="markmap-node" transform="translate(659, -52.28125)"><line stroke="#8c564b" stroke-width="1.375" x1="-1" x2="606" y1="40.6875" y2="40.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="588" height="40"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">3. 
<p data-lines="11,12"><strong>Danceability does NOT predict popularity.</strong> Correlation: 0.013 — essentially zero.</p></div></div></foreignObject></g><g data-depth="3" data-path="1.3.7" class="markmap-node" transform="translate(659, -5.90625)"><line stroke="#e377c2" stroke-width="1.375" x1="-1" x2="1046" y1="40.6875" y2="40.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="1028" height="40"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">4. 
<p data-lines="13,14"><strong>Audio features explain almost nothing.</strong> A linear regression model achieved R² = 0.047, meaning 95.3% of what makes a hit is <em>not</em> in the sound.</p></div></div></foreignObject></g><g data-depth="2" data-path="1.3" class="markmap-node" transform="translate(470, -65.46875)"><line stroke="#2ca02c" stroke-width="1.75" x1="-1" x2="111" y1="20.875" y2="20.875"/><circle stroke-width="1.5" r="6" stroke="#2ca02c" fill="var(--markmap-circle-open-bg)" cx="109" cy="20.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="93" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Key Findings</div></div></foreignObject></g><g data-depth="2" data-path="1.8" class="markmap-node" transform="translate(470, 45.46875)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="135" y1="20.875" y2="20.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="117" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">The Real Insight</div></div></foreignObject></g><g data-depth="3" data-path="1.9.10" class="markmap-node" transform="translate(685, 59.03125)"><line stroke="#17becf" stroke-width="1.375" x1="-1" x2="426" y1="20.6875" y2="20.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="408" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Python, Pandas, NumPy, Matplotlib, Seaborn, Scikit-learn</div></div></foreignObject></g><g data-depth="3" data-path="1.9.11" class="markmap-node" transform="translate(685, 85.40625)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="242" y1="20.6875" y2="20.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="224" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Dataset: <a href="link">Spotify Tracks Dataset</a><